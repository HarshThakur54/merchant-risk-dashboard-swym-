<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Churn Risk Dashboard</title>
    <meta name="description" content="Dashboard for flagging merchants at risk of churning and recommending next steps.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>ChurnGuard</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Merchants
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Recent Activity
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Merchant Risk Analysis</h1>
                    <p class="subtitle">Monitor and prevent merchant churn</p>
                </div>
                <div class="header-actions">
                    <div class="stat-badge">
                        <span id="high-risk-count">0</span> High Risk
                    </div>
                </div>
            </header>

            <div class="table-container">
                <div class="table-header">
                    <h3>Active Merchants</h3>
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="High">High Risk</button>
                        <button class="filter-btn" data-filter="Medium">Medium Risk</button>
                        <button class="filter-btn" data-filter="Low">Low Risk</button>
                    </div>
                </div>
                
                <table class="merchant-table">
                    <thead>
                        <tr>
                            <th>Merchant</th>
                            <th>Plan & MRR</th>
                            <th>Health Metrics</th>
                            <th>Risk Level</th>
                            <th>Recommended Action</th>
                        </tr>
                    </thead>
                    <tbody id="merchant-table-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
